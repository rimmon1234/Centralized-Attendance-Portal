name: Attendance Reminder Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        run: |
          if [ -z "${REMINDER_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "Missing REMINDER_URL or CRON_SECRET secret."
            exit 1
          fi
          curl -sS -X POST "${REMINDER_URL}" \
            -H "x-cron-secret: ${CRON_SECRET}"
        env:
          REMINDER_URL: ${{ secrets.REMINDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
